<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Borges ERP | Acesso Restrito</title>
  <link id="favicon" rel="icon" type="image/png" href="./logomarca3d.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Montserrat:wght@700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: { colors: { vermelho: "#C62828", concreto: "#37474F", gesso: "#FAFAFA", cta: "#F59E0B" }, fontFamily: { title: ['Montserrat', 'sans-serif'], body: ['Inter', 'sans-serif'] } } } }
  </script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-concreto font-body text-concreto min-h-screen flex items-center justify-center p-4 relative overflow-hidden">
  <div class="absolute top-[-10%] left-[-10%] w-96 h-96 bg-vermelho/20 rounded-full blur-[100px]"></div>
  <div class="absolute bottom-[-10%] right-[-10%] w-96 h-96 bg-black/40 rounded-full blur-[100px]"></div>
  <main class="w-full max-w-md bg-white rounded-3xl shadow-2xl p-8 sm:p-10 relative z-10">
    <div class="text-center mb-8">
      <img src="./logomarca3d.png" alt="Logo Borges ERP" class="mx-auto w-32 object-contain mb-4">
      <h1 class="font-title font-extrabold text-2xl text-concreto tracking-tight">BORGES ERP</h1>
      <p class="text-sm text-concreto/60 font-medium mt-1">Insira suas credenciais para acessar.</p>
    </div>
    <form class="space-y-5">
      <div>
        <label class="block text-xs font-bold uppercase text-concreto/60 mb-2">E-mail ou Usuário</label>
        <div class="relative">
          <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-concreto/40"><i data-lucide="user" class="w-5 h-5"></i></div>
          <input id="email" type="email" placeholder="admin@borgessolucoes.com.br" required class="w-full bg-gesso border border-concreto/20 rounded-xl pl-11 pr-4 py-3.5 text-sm outline-none focus:border-vermelho focus:bg-white transition-colors font-medium">
        </div>
      </div>
      <div>
        <label class="block text-xs font-bold uppercase text-concreto/60 mb-2">Senha</label>
        <div class="relative">
          <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-concreto/40"><i data-lucide="lock" class="w-5 h-5"></i></div>
          <input id="senha" type="password" placeholder="••••••••" required class="w-full bg-gesso border border-concreto/20 rounded-xl pl-11 pr-11 py-3.5 text-sm outline-none focus:border-vermelho focus:bg-white transition-colors font-medium">
          <button type="button" class="absolute inset-y-0 right-0 pr-4 flex items-center text-concreto/40 hover:text-vermelho transition-colors"><i data-lucide="eye" class="w-5 h-5"></i></button>
        </div>
      </div>
      <div class="flex items-center justify-between pt-1">
        <label class="flex items-center gap-2 cursor-pointer group">
          <input type="checkbox" class="w-4 h-4 rounded border-concreto/20 text-vermelho focus:ring-vermelho accent-vermelho">
          <span class="text-xs font-semibold text-concreto/70 group-hover:text-concreto transition-colors">Lembrar de mim</span>
        </label>
        <a href="#" class="text-xs font-bold text-vermelho hover:text-vermelho/80 transition-colors">Esqueceu a senha?</a>
      </div>
      <button type="submit" class="w-full py-4 mt-4 rounded-xl font-bold bg-vermelho text-white shadow-lg shadow-vermelho/30 hover:bg-vermelho/90 hover:shadow-vermelho/40 transition-all flex items-center justify-center gap-2">
        Entrar no Sistema <i data-lucide="arrow-right" class="w-4 h-4"></i>
      </button>
    </form>
  </main>
  <div class="absolute bottom-6 text-center w-full z-10 text-white/40 text-xs font-medium">
    &copy; 2026 Borges Soluções. Todos os direitos reservados.
  </div>
  <script>
    lucide.createIcons();
    document.addEventListener('DOMContentLoaded', () => {
        const form = document.querySelector('form');
        if (!form) return;
        form.addEventListener('submit', async (evento) => {
            evento.preventDefault(); 
            const email = document.getElementById('email').value, senha = document.getElementById('senha').value, btn = form.querySelector('button[type="submit"]');
            const textoOriginal = btn.innerHTML;
            btn.innerHTML = "Autenticando..."; btn.disabled = true;
            try {
                const resposta = await fetch('https://borges-erp.onrender.com/api/auth/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email, senha }) });
                if (resposta.ok) {
                    const dados = await resposta.json();
                    localStorage.setItem('borges_token', dados.token);
                    const rotaPendente = localStorage.getItem('borges_rota_pendente');
                    if (rotaPendente && !rotaPendente.includes('login')) {
                        localStorage.removeItem('borges_rota_pendente');
                        window.location.href = rotaPendente;
                    } else { window.location.href = "erp.html"; }
                } else {
                    alert("E-mail ou senha incorretos!");
                    btn.innerHTML = textoOriginal; btn.disabled = false;
                }
            } catch (erro) { alert("Servidor indisponível."); btn.innerHTML = textoOriginal; btn.disabled = false; }
        });
    });
  </script>
</body>
</html>
